# Déploiement VM ; interface : le Makefile (make up / update / logs...).
# Configuration : fichier .env (copier .env.example).

services:
  api:
    build:
      context: .
      args:
        CARD_REF: ${CARD_REF:-main}
        STASE_REF: ${STASE_REF:-main}
    restart: unless-stopped
    environment:
      CARD_API_SALT: ${CARD_API_SALT:?définir CARD_API_SALT dans .env}
      CARD_API_RATE_COMPUTE: ${CARD_API_RATE_COMPUTE:-10}
      CARD_API_RATE_LIGHT: ${CARD_API_RATE_LIGHT:-60}
      CARD_API_SYNC_STATIONS: ${CARD_API_SYNC_STATIONS:-10}
      CARD_API_SYNC_CARDS: ${CARD_API_SYNC_CARDS:-20}
      CARD_API_JOB_STATIONS: ${CARD_API_JOB_STATIONS:-100}
      CARD_API_JOB_CARDS: ${CARD_API_JOB_CARDS:-50}
      CARD_API_JOB_TTL_DAYS: ${CARD_API_JOB_TTL_DAYS:-7}
      CARD_API_JOB_QUEUE_MAX: ${CARD_API_JOB_QUEUE_MAX:-100}
      CARD_API_PRIORITY_STATIONS: ${CARD_API_PRIORITY_STATIONS:-1000}
      CARD_API_PRIORITY_CARDS: ${CARD_API_PRIORITY_CARDS:-226}
    volumes:
      - data:/data
    ports:
      - "127.0.0.1:8000:8000"   # boucle locale seulement ; le frontal
                                # (Apache de la VM ou Caddy ci-dessous)
                                # expose au monde

  # Frontal autoportant pour une VM nue, désactivé par défaut :
  # décommenter COMPOSE_PROFILES=caddy dans .env pour l'activer.
  # Si la VM a déjà un serveur web (Apache...), ne pas l'activer :
  # utiliser make apache.
  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?définir DOMAIN dans .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  data:
  caddy_data:
  caddy_config:
