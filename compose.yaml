# Déploiement VM : `docker compose up -d --build`
# Mise à jour : `git pull && docker compose up -d --build`

services:
  api:
    build: .
    restart: unless-stopped
    volumes:
      - data:/data
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  data:
  caddy_data:
  caddy_config:
